<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al Mujahid Quran App</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

/* Header */
h1{
  margin:0;
  padding:15px;
  background:#0F5C5C;
  color:white;
  text-align:center;
}

/* Container */
.container{
  max-width:500px;
  margin:auto;
  padding:10px;
}

/* Inputs */
select,input,button{
  width:100%;
  padding:12px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}

/* Button */
button{
  background:#0F5C5C;
  color:white;
  font-weight:bold;
  border:none;
}

/* Quran Text */
#quranText{
  margin-top:10px;
  text-align:right;
  direction:rtl;
  font-family:'Amiri', serif;
  font-size:22px;
  background:white;
  color:black;
  padding:15px;
  border-radius:10px;
}

/* Bottom Player */
.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:#0F5C5C;
  color:white;
  text-align:center;
  padding:10px;
}

audio{
  width:100%;
  margin-top:5px;
}

/* Ayah number */
.ayah-number{
  border:1px solid #999;
  border-radius:50%;
  padding:3px 8px;
  margin:3px;
}
</style>
</head>

<body>

<h1>Al Qur'an</h1>

<div class="container">

<input type="text" id="searchSurah" placeholder="Search Surah..." onkeyup="searchSurah()">

<select id="reciter">
  <option value="maher">Sheikh Maher Al-Muaiqly</option>
  <option value="dossari">Sheikh Yasser Al-Dossary</option>
  <option value="sudais">Sheikh Abdul Rahman Al-Sudais</option>
  <option value="shuraym">Sheikh Saud Al-Shuraim</option>
</select>

<select id="surah"></select>

<button onclick="playAudio()">▶ Play</button>
<button onclick="downloadSurah()">⬇ Download Surah</button>

<p id="nowPlaying"></p>

<div id="quranText"></div>

</div>

<!-- Bottom Player -->
<div class="player">
  <p id="playerText">No Surah Playing</p>
  <audio id="audioPlayer" controls></audio>
</div>

<script>

const surahNames = [
"001 - Al-Fatiha","002 - Al-Baqarah","003 - Aal-E-Imran","004 - An-Nisa",
"005 - Al-Ma'idah","006 - Al-An'am","007 - Al-A'raf","008 - Al-Anfal",
"009 - At-Tawbah","010 - Yunus","011 - Hud","012 - Yusuf",
"013 - Ar-Ra'd","014 - Ibrahim","015 - Al-Hijr","016 - An-Nahl",
"017 - Al-Isra","018 - Al-Kahf","019 - Maryam","020 - Ta-Ha",
"021 - Al-Anbiya","022 - Al-Hajj","023 - Al-Mu'minun","024 - An-Nur",
"025 - Al-Furqan","026 - Ash-Shu'ara","027 - An-Naml","028 - Al-Qasas",
"029 - Al-Ankabut","030 - Ar-Rum","031 - Luqman","032 - As-Sajdah",
"033 - Al-Ahzab","034 - Saba","035 - Fatir","036 - Ya-Sin",
"037 - As-Saffat","038 - Sad","039 - Az-Zumar","040 - Ghafir",
"041 - Fussilat","042 - Ash-Shura","043 - Az-Zukhruf","044 - Ad-Dukhan",
"045 - Al-Jathiyah","046 - Al-Ahqaf","047 - Muhammad","048 - Al-Fath",
"049 - Al-Hujurat","050 - Qaf","051 - Adh-Dhariyat","052 - At-Tur",
"053 - An-Najm","054 - Al-Qamar","055 - Ar-Rahman","056 - Al-Waqi'ah",
"057 - Al-Hadid","058 - Al-Mujadila","059 - Al-Hashr","060 - Al-Mumtahanah",
"061 - As-Saff","062 - Al-Jumu'ah","063 - Al-Munafiqun","064 - At-Taghabun",
"065 - At-Talaq","066 - At-Tahrim","067 - Al-Mulk","068 - Al-Qalam",
"069 - Al-Haqqah","070 - Al-Ma'arij","071 - Nuh","072 - Al-Jinn",
"073 - Al-Muzzammil","074 - Al-Muddaththir","075 - Al-Qiyamah","076 - Al-Insan",
"077 - Al-Mursalat","078 - An-Naba","079 - An-Nazi'at","080 - Abasa",
"081 - At-Takwir","082 - Al-Infitar","083 - Al-Mutaffifin","084 - Al-Inshiqaq",
"085 - Al-Buruj","086 - At-Tariq","087 - Al-A'la","088 - Al-Ghashiyah",
"089 - Al-Fajr","090 - Al-Balad","091 - Ash-Shams","092 - Al-Layl",
"093 - Ad-Duha","094 - Ash-Sharh","095 - At-Tin","096 - Al-Alaq",
"097 - Al-Qadr","098 - Al-Bayyinah","099 - Az-Zalzalah","100 - Al-Adiyat",
"101 - Al-Qari'ah","102 - At-Takathur","103 - Al-Asr","104 - Al-Humazah",
"105 - Al-Fil","106 - Quraysh","107 - Al-Ma'un","108 - Al-Kawthar",
"109 - Al-Kafirun","110 - An-Nasr","111 - Al-Masad",
"112 - Al-Ikhlas","113 - Al-Falaq","114 - An-Nas"
];

const surahSelect=document.getElementById("surah");

surahNames.forEach((name,index)=>{
  let option=document.createElement("option");
  option.value=(index+1).toString().padStart(3,"0");
  option.text=name;
  surahSelect.appendChild(option);
});

const servers={
  maher:"https://server8.mp3quran.net/maher/",
  sudais:"https://server11.mp3quran.net/sds/",
  shuraym:"https://server7.mp3quran.net/shur/",
  dossari:"https://server11.mp3quran.net/yasser/"
};

function playAudio(){
  const reciter=document.getElementById("reciter").value;
  const surah=surahSelect.value;
  const audio=document.getElementById("audioPlayer");

  audio.src=servers[reciter]+surah+".mp3";
  audio.play();

  const name = surahSelect.options[surahSelect.selectedIndex].text;

  document.getElementById("nowPlaying").innerText="Now Playing: "+name;
  document.getElementById("playerText").innerText=name;

  localStorage.setItem("lastSurah",surah);
  localStorage.setItem("lastReciter",reciter);

  loadQuranText(surah);
}

function downloadSurah(){
  const reciter=document.getElementById("reciter").value;
  const surah=surahSelect.value;
  window.open(servers[reciter]+surah+".mp3","_blank");
}

document.getElementById("audioPlayer").addEventListener("ended",function(){
  let currentIndex=surahSelect.selectedIndex;
  if(currentIndex<surahSelect.options.length-1){
    surahSelect.selectedIndex=currentIndex+1;
    playAudio();
  }
});

window.onload=function(){
  let savedSurah=localStorage.getItem("lastSurah");
  let savedReciter=localStorage.getItem("lastReciter");
  if(savedSurah) surahSelect.value=savedSurah;
  if(savedReciter) document.getElementById("reciter").value=savedReciter;
};

function searchSurah(){
  let input=document.getElementById("searchSurah").value.toLowerCase();
  let options=surahSelect.options;
  for(let i=0;i<options.length;i++){
    if(options[i].text.toLowerCase().includes(input)){
      surahSelect.selectedIndex=i;
      break;
    }
  }
}

function loadQuranText(surahNumber){
  fetch("https://api.alquran.cloud/v1/surah/"+parseInt(surahNumber))
  .then(response=>response.json())
  .then(data=>{
    let verses=data.data.ayahs;
    let textHTML="";

    verses.forEach((ayah)=>{
      let arabicNumber=ayah.numberInSurah
        .toString()
        .replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);

      textHTML+=`
        ${ayah.text}
        <span class="ayah-number">${arabicNumber}</span>
      `;
    });

    document.getElementById("quranText").innerHTML=textHTML;
  });
}

</script>

</body>
</html>
