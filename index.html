<!DOCTYPE html>
<html>
<head>
<title>Al-Mujahid Quran App</title>
<style>
body { font-family: Arial; text-align:center; background:#0b3d2e; color:white; }
select, button { padding:10px; margin:10px; width:80%; max-width:400px; font-size:16px; }
audio { width:80%; max-width:400px; margin-top:10px; }
#quranText { margin:20px; padding:15px; background:white; color:black; border-radius:10px; display:none; max-height:300px; overflow:auto; }
</style>
</head>
<body>

<h2>📖 Al-Mujahid Quran</h2>

<select id="reciter">
<option value="mishary_rashid_alafasy">Mishary Rashid Al-Afasy</option>
<option value="maher_al_muaiqly">Maher Al-Muaiqly</option>
<option value="abdulrahman_alsudais">Abdulrahman Al-Sudais</option>
<option value="saood_alshuraim">Saud Al-Shuraim</option>
<option value="yasser_aldossari">Yasser Al-Dossari</option>
<option value="bandar_baleela">Bandar Baleela</option>
</select>

<select id="surah"></select>

<button onclick="playSurah()">▶ Play</button>
<button onclick="showText()">📖 Show Quran Text</button>

<audio id="audioPlayer" controls></audio>

<div id="quranText"></div>

<script>
const surahSelect = document.getElementById("surah");

for(let i=1; i<=114; i++){
  let option = document.createElement("option");
  option.value = i;
  option.text = "Surah " + i;
  surahSelect.appendChild(option);
}

function playSurah(){
  const reciter = document.getElementById("reciter").value;
  const surah = surahSelect.value.padStart(3,'0');

  const reciterMap = {
    mishary_rashid_alafasy: "https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/",
    maher_al_muaiqly: "https://download.quranicaudio.com/quran/maher_al_muaiqly/",
    abdulrahman_alsudais: "https://download.quranicaudio.com/quran/abdurrahmaan_as_sudais/",
    saood_alshuraim: "https://download.quranicaudio.com/quran/saood_ash-shuraym/",
    yasser_aldossari: "https://download.quranicaudio.com/quran/yasser_ad-dussary/",
    bandar_baleela: "https://download.quranicaudio.com/quran/bandar_balila/"
  };

  const url = reciterMap[reciter] + surah + ".mp3";
  document.getElementById("audioPlayer").src = url;
}

function showText(){
  const surah = surahSelect.value;
  fetch("https://api.alquran.cloud/v1/surah/"+surah)
    .then(response => response.json())
    .then(data => {
      let verses = data.data.ayahs.map(a => a.text).join(" ");
      const div = document.getElementById("quranText");
      div.style.display = "block";
      div.innerHTML = verses;
    })
    .catch(() => alert("Text failed to load"));
}
</script>

</body>
</html>
