<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Al Mujahid Quran</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: white;
    color: black;
    transition: 0.3s;
}

header {
    background: #0a7c3b;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.container {
    padding: 15px;
}

select, button {
    padding: 8px;
    margin: 5px 0;
    border-radius: 6px;
}

.dark-mode {
    background: #121212;
    color: white;
}

.dark-mode header {
    background: #1f1f1f;
}

.dark-mode select,
.dark-mode button {
    background: #333;
    color: white;
    border: none;
}
</style>
</head>
<body>

<header>
    <div>📖 Al Mujahid Quran</div>
    <button onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
</header>

<div class="container">

<h3>Select Reciter</h3>
<select id="reciter">
    <option value="https://server7.mp3quran.net/maher/">Maher Al-Muaiqly</option>
    <option value="https://server7.mp3quran.net/sudais/">Abdulrahman Al-Sudais</option>
    <option value="https://server7.mp3quran.net/shur/">Saud Al-Shuraim</option>
    <option value="https://server7.mp3quran.net/dosary/">Yasser Al-Dosary</option>
</select>

<h3>Select Surah</h3>
<select id="surah"></select>

<br>
<button onclick="playSurah()">▶ Play</button>

<br><br>
<audio id="audio" controls style="width:100%;"></audio>

</div>

<script>

/* Dark Mode */
function toggleTheme() {
    document.body.classList.toggle("dark-mode");
    const btn = document.getElementById("themeBtn");

    if (document.body.classList.contains("dark-mode")) {
        btn.textContent = "☀ Light Mode";
        localStorage.setItem("theme", "dark");
    } else {
        btn.textContent = "🌙 Dark Mode";
        localStorage.setItem("theme", "light");
    }
}

window.onload = function() {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-mode");
        document.getElementById("themeBtn").textContent = "☀ Light Mode";
    }

    loadSurahs();
};

/* Load 114 Surahs */
function loadSurahs() {
    const surahSelect = document.getElementById("surah");

    for (let i = 1; i <= 114; i++) {
        let option = document.createElement("option");
        option.value = i.toString().padStart(3, '0');
        option.text = i + " - Surah " + i;
        surahSelect.appendChild(option);
    }
}

/* Play Surah */
function playSurah() {
    const reciter = document.getElementById("reciter").value;
    const surah = document.getElementById("surah").value;
    const audio = document.getElementById("audio");

    audio.src = reciter + surah + ".mp3";
    audio.play();
}

</script>

</body>
</html>
