<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Al Mujahid Quran</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    transition: background 0.3s, color 0.3s;
}

/* Splash Screen */
#splash {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #0a7c3b;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 26px;
    z-index: 9999;
}

/* Header */
header {
    background: #0a7c3b;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Button Style */
button {
    padding: 8px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin: 5px 0;
}

/* Dark Mode */
.dark-mode {
    background-color: #121212;
    color: white;
}

.dark-mode header {
    background: #1f1f1f;
}

.dark-mode button {
    background: #333;
    color: white;
}

/* Content */
.container {
    padding: 15px;
}
</style>
</head>

<body>

<!-- Splash Screen -->
<div id="splash">
    📖 Al Mujahid Quran
</div>

<header>
    <div>Al Mujahid Quran</div>
    <button onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
</header>

<div class="container">

    <h3>Select Surah</h3>
    <select id="surahSelect" onchange="saveSurah()">
        <option value="1">1 - Al-Fatiha</option>
        <option value="2">2 - Al-Baqarah</option>
        <option value="3">3 - Aal-Imran</option>
    </select>

    <br><br>

    <button onclick="saveBookmark()">🔖 Save Bookmark</button>
    <button onclick="loadBookmark()">📌 Go To Bookmark</button>

</div>

<script>

/* Splash Control */
window.addEventListener("load", function () {
    setTimeout(function () {
        document.getElementById("splash").style.display = "none";
    }, 2000);
});

/* Theme Toggle */
function toggleTheme() {
    document.body.classList.toggle("dark-mode");

    const btn = document.getElementById("themeBtn");

    if (document.body.classList.contains("dark-mode")) {
        btn.textContent = "☀ Light Mode";
        localStorage.setItem("theme", "dark");
    } else {
        btn.textContent = "🌙 Dark Mode";
        localStorage.setItem("theme", "light");
    }
}

/* Load Saved Theme */
window.onload = function() {
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme === "dark") {
        document.body.classList.add("dark-mode");
        document.getElementById("themeBtn").textContent = "☀ Light Mode";
    }

    loadBookmark();
};

/* Save Current Surah */
function saveSurah() {
    const surah = document.getElementById("surahSelect").value;
    localStorage.setItem("lastSurah", surah);
}

/* Save Bookmark */
function saveBookmark() {
    const surah = document.getElementById("surahSelect").value;
    localStorage.setItem("bookmarkSurah", surah);
    alert("Bookmark Saved!");
}

/* Load Bookmark */
function loadBookmark() {
    const saved = localStorage.getItem("bookmarkSurah");
    if (saved) {
        document.getElementById("surahSelect").value = saved;
    }

    const last = localStorage.getItem("lastSurah");
    if (last) {
        document.getElementById("surahSelect").value = last;
    }
}

</script>

</body>
</html>
