<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Mujahid Quran</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: white;
    color: black;
    transition: 0.3s;
    padding: 20px;
}

.dark {
    background: #111;
    color: white;
}

header {
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 20px;
}

select, button {
    padding: 8px;
    margin: 10px 0;
    width: 100%;
    font-size: 16px;
}

button {
    background: green;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    opacity: 0.8;
}

#quranText {
    margin-top: 20px;
    font-size: 18px;
    line-height: 1.8;
}
</style>
</head>

<body>

<header>AI Mujahid Quran</header>

<button onclick="toggleMode()">Toggle Dark / Light Mode</button>

<h3>Select Reciter</h3>
<select id="reciter">
<option value="ar.almuaiqly">Sheikh Maher Al-Muaiqly</option>
<option value="ar.yasseraldossari">Sheikh Yasser Ad-Dossari</option>
<option value="ar.abdurrahmaansudais">Sheikh Abdulrahman As-Sudais</option>
<option value="ar.saoodshuraym">Sheikh Saud Al-Shuraim</option>
</select>

<h3>Select Surah</h3>
<select id="surah"></select>

<button onclick="playSurah()">Play Surah</button>

<audio id="audioPlayer" controls style="width:100%; margin-top:15px;"></audio>

<div id="quranText"></div>

<script>

const surahs = [
"Al-Fatihah","Al-Baqarah","Aal-Imran","An-Nisa","Al-Ma'idah","Al-An'am",
"Al-A'raf","Al-Anfal","At-Tawbah","Yunus","Hud","Yusuf","Ar-Ra'd",
"Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Ta-Ha",
"Al-Anbiya","Al-Hajj","Al-Mu'minun","An-Nur","Al-Furqan","Ash-Shu'ara",
"An-Naml","Al-Qasas","Al-Ankabut","Ar-Rum","Luqman","As-Sajdah",
"Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar",
"Ghafir","Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah",
"Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Adh-Dhariyat",
"At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid",
"Al-Mujadila","Al-Hashr","Al-Mumtahanah","As-Saff","Al-Jumu'ah",
"Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk",
"Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil",
"Al-Muddaththir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba",
"An-Nazi'at","Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin",
"Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah",
"Al-Fajr","Al-Balad","Ash-Shams","Al-Layl","Ad-Duha","Ash-Sharh",
"At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat",
"Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh",
"Al-Ma'un","Al-Kawthar","Al-Kafirun","An-Nasr","Al-Masad",
"Al-Ikhlas","Al-Falaq","An-Nas"
];

const surahSelect = document.getElementById("surah");

surahs.forEach((name, index) => {
    const option = document.createElement("option");
    option.value = index + 1;
    option.textContent = (index + 1) + ". " + name;
    surahSelect.appendChild(option);
});

function playSurah() {
    const reciter = document.getElementById("reciter").value;
    const surahNumber = document.getElementById("surah").value;

    const audioURL = `https://cdn.islamic.network/quran/audio-surah/128/${reciter}/${surahNumber}.mp3`;

    const audio = document.getElementById("audioPlayer");
    audio.src = audioURL;
    audio.play();

    fetch(`https://api.alquran.cloud/v1/surah/${surahNumber}`)
    .then(res => res.json())
    .then(data => {
        let text = "";
        data.data.ayahs.forEach(ayah => {
            text += ayah.text + " ";
        });
        document.getElementById("quranText").innerText = text;
    });
}

function toggleMode() {
    document.body.classList.toggle("dark");
}

</script>

</body>
</html>
