<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al Mujahid Quran App</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
  transition:0.3s;
}

.header{
  background:#0F5C5C;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.controls{
  padding:10px;
}

.controls input, .controls select, .controls button{
  width:100%;
  padding:12px;
  margin:5px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

.surah-list{
  max-width:500px;
  margin:auto;
}

.surah{
  background:white;
  margin:8px;
  padding:15px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:0.3s;
}

.surah:hover{
  background:#e6f2f2;
}

.surah-number{
  font-weight:bold;
  color:#0F5C5C;
}

.surah-name{
  flex:1;
  margin-left:10px;
}

#quranText{
  max-width:500px;
  margin:10px auto;
  background:white;
  padding:15px;
  border-radius:10px;
  direction:rtl;
  font-family:'Amiri', serif;
  font-size:22px;
  line-height:2;
}

.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:#0F5C5C;
  color:white;
  text-align:center;
  padding:10px;
}

audio{
  width:100%;
}

.ayah-number{
  border:1px solid #999;
  border-radius:50%;
  padding:3px 8px;
  margin:3px;
}

/* 🌙 DARK MODE */
.dark{
  background:#121212;
  color:white;
}

.dark .surah{
  background:#1e1e1e;
}

.dark #quranText{
  background:#1e1e1e;
}
</style>
</head>

<body>

<div class="header">📖 Al Qur'an</div>

<div class="controls">
  <input type="text" placeholder="Search Surah..." onkeyup="searchSurah(this.value)">

  <select id="reciter">
    <option value="maher">Sheikh Maher Al-Muaiqly</option>
    <option value="dossari">Sheikh Yasser Al-Dossary</option>
    <option value="sudais">Sheikh Abdul Rahman Al-Sudais</option>
    <option value="shuraym">Sheikh Saud Al-Shuraim</option>
  </select>

  <!-- 🌙 Dark Mode -->
  <button onclick="toggleDark()">🌙 Toggle Dark Mode</button>

  <!-- ⬇ Download -->
  <button onclick="downloadSurah()">⬇ Download Surah</button>
</div>

<div class="surah-list" id="surahList"></div>

<div id="quranText"></div>

<div class="player">
  <p id="playerText">Select a Surah</p>
  <audio id="audioPlayer" controls></audio>
</div>

<script>

const surahs = [/* same array unchanged */"Al-Fatiha","Al-Baqarah","Aal-E-Imran","An-Nisa","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Tawbah","Yunus","Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Ta-Ha","Al-Anbiya","Al-Hajj","Al-Mu'minun","An-Nur","Al-Furqan","Ash-Shu'ara","An-Naml","Al-Qasas","Al-Ankabut","Ar-Rum","Luqman","As-Sajdah","Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar","Ghafir","Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah","Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Adh-Dhariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid","Al-Mujadila","Al-Hashr","Al-Mumtahanah","As-Saff","Al-Jumu'ah","Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil","Al-Muddaththir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba","An-Nazi'at","Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah","Al-Fajr","Al-Balad","Ash-Shams","Al-Layl","Ad-Duha","Ash-Sharh","At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat","Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh","Al-Ma'un","Al-Kawthar","Al-Kafirun","An-Nasr","Al-Masad","Al-Ikhlas","Al-Falaq","An-Nas"];

const servers={
  maher:"https://server8.mp3quran.net/maher/",
  sudais:"https://server11.mp3quran.net/sds/",
  shuraym:"https://server7.mp3quran.net/shur/",
  dossari:"https://server11.mp3quran.net/yasser/"
};

let currentAudio = "";

const list = document.getElementById("surahList");

function displaySurahs(filter=""){
  list.innerHTML="";
  surahs.forEach((name,index)=>{
    if(name.toLowerCase().includes(filter.toLowerCase())){
      const div=document.createElement("div");
      div.className="surah";
      div.innerHTML=`
        <span class="surah-number">${index+1}</span>
        <span class="surah-name">${name}</span>
        <span onclick="saveFav(event,'${name}')">❤️</span>
      `;
      div.onclick=()=>playSurah(index+1,name);
      list.appendChild(div);
    }
  });
}

function searchSurah(value){
  displaySurahs(value);
}

function playSurah(num,name){
  const reciter=document.getElementById("reciter").value;
  const audio=document.getElementById("audioPlayer");
  const surah=num.toString().padStart(3,"0");

  const url = servers[reciter]+surah+".mp3";
  audio.src=url;
  currentAudio = url;

  audio.play();

  document.getElementById("playerText").innerText=name;

  localStorage.setItem("lastSurah", num);

  loadQuranText(num);
}

function loadQuranText(num){
  fetch("https://api.alquran.cloud/v1/surah/"+num)
  .then(res=>res.json())
  .then(data=>{
    let text="";
    data.data.ayahs.forEach(a=>{
      let n=a.numberInSurah.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);
      text+=`${a.text} <span class="ayah-number">${n}</span>`;
    });
    document.getElementById("quranText").innerHTML=text;
  });
}

/* 🌙 Dark Mode */
function toggleDark(){
  document.body.classList.toggle("dark");
}

/* ❤️ Favorites */
function saveFav(e,name){
  e.stopPropagation();
  let fav = JSON.parse(localStorage.getItem("fav")) || [];
  if(!fav.includes(name)){
    fav.push(name);
  }
  localStorage.setItem("fav", JSON.stringify(fav));
  alert(name + " added to favorites");
}

/* ⬇ Download */
function downloadSurah(){
  if(currentAudio === ""){
    alert("Play a surah first");
    return;
  }
  const a=document.createElement("a");
  a.href=currentAudio;
  a.download="surah.mp3";
  a.click();
}

/* ⏯ Resume */
window.onload = function(){
  displaySurahs();
  let last = localStorage.getItem("lastSurah");
  if(last){
    playSurah(parseInt(last), surahs[last-1]);
  }
}

displaySurahs();

</script>

</body>
</html>
