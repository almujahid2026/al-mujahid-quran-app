<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Mujahid Quran</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(#0f3d46, #1d5b63);
    color: white;
    padding: 20px;
}

.container {
    max-width: 500px;
    margin: auto;
}

select {
    width: 100%;
    padding: 12px;
    border-radius: 15px;
    border: none;
    margin-top: 10px;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: #FFD400;
}

.card {
    background: white;
    color: black;
    padding: 20px;
    margin-top: 20px;
    border-radius: 25px;
    font-size: 22px;
    line-height: 2.2;
    direction: rtl;
    text-align: right;
}

.nowPlaying {
    margin-top: 15px;
    text-align: center;
    font-size: 18px;
}

audio {
    width: 100%;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
<select id="reciter">
<option value="maher_al_muaiqly">Sheikh Maher Al-Muaiqly</option>
<option value="yasser_ad_dussary">Sheikh Yasser Ad-Dossari</option>
<option value="abdurrahmaan_as_sudais">Sheikh Abdulrahman As-Sudais</option>
<option value="saood_ash_shuraym">Sheikh Saud Al-Shuraim</option>
</select>

<select id="surah"></select>

<button id="playBtn">Play</button>
<button id="downloadBtn">Download Surah</button>

<audio id="audioPlayer" controls></audio>

<div class="nowPlaying" id="nowPlaying"></div>

<div class="card" id="quranText"></div>

</div>

<script>

const surahs = [
"Al-Fatihah","Al-Baqarah","Aal-Imran","An-Nisa","Al-Ma'idah","Al-An'am",
"Al-A'raf","Al-Anfal","At-Tawbah","Yunus","Hud","Yusuf","Ar-Ra'd",
"Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Ta-Ha",
"Al-Anbiya","Al-Hajj","Al-Mu'minun","An-Nur","Al-Furqan","Ash-Shu'ara",
"An-Naml","Al-Qasas","Al-Ankabut","Ar-Rum","Luqman","As-Sajdah",
"Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar",
"Ghafir","Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah",
"Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Adh-Dhariyat",
"At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid",
"Al-Mujadila","Al-Hashr","Al-Mumtahanah","As-Saff","Al-Jumu'ah",
"Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk",
"Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil",
"Al-Muddaththir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba",
"An-Nazi'at","Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin",
"Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah",
"Al-Fajr","Al-Balad","Ash-Shams","Al-Layl","Ad-Duha","Ash-Sharh",
"At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat",
"Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh",
"Al-Ma'un","Al-Kawthar","Al-Kafirun","An-Nasr","Al-Masad",
"Al-Ikhlas","Al-Falaq","An-Nas"
];

const surahSelect = document.getElementById("surah");
const audioPlayer = document.getElementById("audioPlayer");

surahs.forEach((name, index) => {
    const option = document.createElement("option");
    option.value = index + 1;
    option.textContent = (index + 1) + " - " + name;
    surahSelect.appendChild(option);
});

document.getElementById("playBtn").addEventListener("click", function () {

    const reciter = document.getElementById("reciter").value;
    const surahNumber = document.getElementById("surah").value;
    const padded = surahNumber.toString().padStart(3, '0');

    const audioURL =
"https://download.quranicaudio.com/quran/" + reciter + "/" + padded + ".mp3";

    audioPlayer.src = audioURL;
    audioPlayer.play();

    document.getElementById("nowPlaying").innerText =
    "Now Playing: " + surahNumber + " - " + surahs[surahNumber - 1];

    fetch("https://api.alquran.cloud/v1/surah/" + surahNumber + "/quran-uthmani")
    .then(res => res.json())
    .then(data => {
        let text = "";
        data.data.ayahs.forEach(ayah => {
            text += `
                ${ayah.text}
                <span style="
                    display:inline-flex;
                    justify-content:center;
                    align-items:center;
                    width:28px;
                    height:28px;
                    border:2px solid black;
                    border-radius:50%;
                    font-size:14px;
                    margin:0 6px;
                ">
                    ${ayah.numberInSurah}
                </span>
            `;
        });
        document.getElementById("quranText").innerHTML = text;
    });

});

document.getElementById("downloadBtn").addEventListener("click", function () {

    const reciter = document.getElementById("reciter").value;
    const surahNumber = document.getElementById("surah").value;
    const padded = surahNumber.toString().padStart(3, '0');

    const audioURL =
    "https://server8.mp3quran.net/" + reciter + "/" + padded + ".mp3";

    window.open(audioURL);

});

</script>

</body>
</html>
