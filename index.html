<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Mujahid Quran</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(#0f3d46, #1d5b63);
    color: white;
    padding: 20px;
}

.container {
    max-width: 500px;
    margin: auto;
}

select {
    width: 100%;
    padding: 12px;
    border-radius: 15px;
    border: none;
    margin-top: 10px;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 20px;
    border: none;
    cursor: pointer;
}

.playBtn {
    background: #FFD400;
}

.downloadBtn {
    background: #FFD400;
}

.card {
    background: white;
    color: black;
    padding: 20px;
    margin-top: 20px;
    border-radius: 25px;
    font-size: 22px;
    line-height: 2.2;
    direction: rtl;
    text-align: right;
}

.nowPlaying {
    margin-top: 15px;
    text-align: center;
    font-size: 18px;
}

audio {
    width: 100%;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<select id="reciter">
<option value="ar.mahermuaiqly">Sheikh Maher Al-Muaiqly</option>
<option value="ar.yasseraldossary">Sheikh Yasser Ad-Dossari</option>
<option value="ar.abdurrahmaansudais">Sheikh Abdulrahman As-Sudais</option>
<option value="ar.saoodshuraym">Sheikh Saud Al-Shuraim</option>
</select>

<select id="surah"></select>

<button class="playBtn" onclick="playSurah()">Play</button>
<button class="downloadBtn" onclick="downloadSurah()">Download Surah</button>

<audio id="audioPlayer" controls></audio>

<div class="nowPlaying" id="nowPlaying"></div>

<div class="card" id="quranText"></div>

</div>

<script>

const surahs = [
"Al-Fatihah","Al-Baqarah","Aal-Imran","An-Nisa","Al-Ma'idah","Al-An'am",
"Al-A'raf","Al-Anfal","At-Tawbah","Yunus","Hud","Yusuf","Ar-Ra'd",
"Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Ta-Ha",
"Al-Anbiya","Al-Hajj","Al-Mu'minun","An-Nur","Al-Furqan","Ash-Shu'ara",
"An-Naml","Al-Qasas","Al-Ankabut","Ar-Rum","Luqman","As-Sajdah",
"Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar",
"Ghafir","Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah",
"Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Adh-Dhariyat",
"At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid",
"Al-Mujadila","Al-Hashr","Al-Mumtahanah","As-Saff","Al-Jumu'ah",
"Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk",
"Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil",
"Al-Muddaththir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba",
"An-Nazi'at","Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin",
"Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah",
"Al-Fajr","Al-Balad","Ash-Shams","Al-Layl","Ad-Duha","Ash-Sharh",
"At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat",
"Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh",
"Al-Ma'un","Al-Kawthar","Al-Kafirun","An-Nasr","Al-Masad",
"Al-Ikhlas","Al-Falaq","An-Nas"
];

const reciters = {
    "ar.mahermuaiqly": "Maher_Al_Muaiqly_64kbps",
    "ar.yasseraldossary": "Yasser_Ad-Dussary_64kbps",
    "ar.abdurrahmaansudais": "Abdurrahmaan_As-Sudais_64kbps",
    "ar.saoodshuraym": "Saood_ash-Shuraym_64kbps"
};

const surahSelect = document.getElementById("surah");

surahs.forEach((name, index) => {
    const option = document.createElement("option");
    option.value = index + 1;
    option.textContent = (index + 1) + " - " + name;
    surahSelect.appendChild(option);
});

function playSurah() {
    const reciterKey = document.getElementById("reciter").value;
    const surahNumber = document.getElementById("surah").value;
    const surahName = surahs[surahNumber - 1];

    const reciterFolder = reciters[reciterKey];

    const paddedSurah = surahNumber.toString().padStart(3, '0');

    const audioURL = `https://everyayah.com/data/${reciterFolder}/${paddedSurah}.mp3`;

    const audio = document.getElementById("audioPlayer");
    audio.src = audioURL;
    audio.play();

    document.getElementById("nowPlaying").innerText =
        "Now Playing: " + surahNumber + " - " + surahName;

    fetch(`https://api.alquran.cloud/v1/surah/${surahNumber}/quran-uthmani`)
    .then(res => res.json())
    .then(data => {
        let text = "";
        data.data.ayahs.forEach(ayah => {
            text += `
                ${ayah.text}
                <span style="
                    display:inline-flex;
                    justify-content:center;
                    align-items:center;
                    width:28px;
                    height:28px;
                    border:2px solid black;
                    border-radius:50%;
                    font-size:14px;
                    margin:0 6px;
                ">
                    ${ayah.numberInSurah}
                </span>
            `;
        });
        document.getElementById("quranText").innerHTML = text;
    });
}

function downloadSurah() {
    const reciterKey = document.getElementById("reciter").value;
    const surahNumber = document.getElementById("surah").value;
    const reciterFolder = reciters[reciterKey];
    const paddedSurah = surahNumber.toString().padStart(3, '0');

    const audioURL = `https://everyayah.com/data/${reciterFolder}/${paddedSurah}.mp3`;

    window.open(audioURL);
}

</script>

</body>
</html>
