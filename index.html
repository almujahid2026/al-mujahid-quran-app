<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Al-Mujahid Digital Quran</title>

<style>
body {
    font-family: Arial;
    background: #0f2027;
    color: white;
    text-align: center;
    padding: 20px;
}

select, audio {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
}
</style>
</head>

<body>

<h2>Al-Mujahid Digital Quran</h2>

<select id="surahSelect"></select>

<select id="reciterSelect">
    <option value="afs">Mishary Rashid Alafasy</option>
    <option value="maher">Mahir Al-Muayqali</option>
</select>

<audio id="audioPlayer" controls></audio>

<script>
const surahSelect = document.getElementById("surahSelect");
const reciterSelect = document.getElementById("reciterSelect");
const audioPlayer = document.getElementById("audioPlayer");

const surahNames = [
"Al-Fatiha","Al-Baqarah","Aal-Imran","An-Nisa","Al-Ma'idah","Al-An'am",
"Al-A'raf","Al-Anfal","At-Tawbah","Yunus","Hud","Yusuf","Ar-Ra'd",
"Ibrahim","Al-Hijr","An-Nahl","Al-Isra","Al-Kahf","Maryam","Ta-Ha",
"Al-Anbiya","Al-Hajj","Al-Mu'minun","An-Nur","Al-Furqan","Ash-Shu'ara",
"An-Naml","Al-Qasas","Al-Ankabut","Ar-Rum","Luqman","As-Sajdah",
"Al-Ahzab","Saba","Fatir","Ya-Sin","As-Saffat","Sad","Az-Zumar",
"Ghafir","Fussilat","Ash-Shura","Az-Zukhruf","Ad-Dukhan","Al-Jathiyah",
"Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Adh-Dhariyat",
"At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid",
"Al-Mujadila","Al-Hashr","Al-Mumtahanah","As-Saff","Al-Jumu'ah",
"Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk",
"Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil",
"Al-Muddathir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba",
"An-Nazi'at","Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin",
"Al-Inshiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghashiyah","Al-Fajr",
"Al-Balad","Ash-Shams","Al-Layl","Ad-Duhaa","Ash-Sharh","At-Tin",
"Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat",
"Al-Qari'ah","At-Takathur","Al-Asr","Al-Humazah","Al-Fil","Quraysh",
"Al-Ma'un","Al-Kawthar","Al-Kafirun","An-Nasr","Al-Masad",
"Al-Ikhlas","Al-Falaq","An-Nas"
];

for (let i = 1; i <= 114; i++) {
    let num = String(i).padStart(3,'0');
    let option = document.createElement("option");
    option.value = num + ".mp3";
    option.textContent = num + " - " + surahNames[i-1];
    surahSelect.appendChild(option);
}

function updateAudio() {
    const reciter = reciterSelect.value;
    const surah = surahSelect.value;

    let baseURL = "";

    if (reciter === "afs") {
        baseURL = "https://server8.mp3quran.net/afs/";
    }

    if (reciter === "maher") {
        baseURL = "https://server8.mp3quran.net/maher/";
    }

    audioPlayer.src = baseURL + surah;
}

surahSelect.addEventListener("change", updateAudio);
reciterSelect.addEventListener("change", updateAudio);
</script>

</body>
</html>
